function removeRedemption(memberId, rewardId){
  if(needParent()) return;
  let idx=-1, latest=-1;
  state.redemptions.forEach((x,i)=>{ if(x.memberId===memberId && x.rewardId===rewardId){ const t=x.ts||0; if(t>=latest){ latest=t; idx=i; } } });
  if(idx<0) return;
  const r=state.redemptions[idx];
  if(!confirm('Remove “'+r.name+'” from '+(member(memberId)||{}).name+'? The ⭐'+r.cost+' will be refunded.')) return;
  state.redemptions.splice(idx,1);
  save(); render();
  toast('↩️ Removed '+r.name+' · ⭐'+r.cost+' refunded');
}
function redeem(rewardId, memberId){
  if(blockedByPause()) return;
  const r=state.rewards.find(x=>x.id===rewardId);
  const m=member(memberId);
  if(!r||!m) return;
  if(starBalance(memberId)<r.cost){ toast('🔒 Not enough stars yet'); return; }
  const today=todayYmd();
  const lim=state.settings.dailySpendLimit||0;
  if(lim>0 && spentToday(memberId,today)+r.cost>lim){
    toast('🚦 Daily spend limit reached'); return;
  }
  if(r.limit && rewardRemaining(memberId,r)<=0){
    toast('🚦 '+esc(m.name)+' has used all '+r.limit+' this '+(r.limitPer||'day')); return;
  }
  state.redemptions.push({id:uid(), memberId, rewardId, name:r.name, sticker:r.sticker||null, emoji:r.emoji, cost:r.cost, date:today, ts:Date.now()});
  logActivity('redeem',{memberId, label:r.name, stars:-r.cost});
  save(); closeModal(); render(); starPop();
  toast('🎁 '+esc(m.name)+' redeemed '+esc(r.name)+'!');
}

function refreshListEditor(listId){

let _liDrag=null;
function bindListDrag(listId){
  const cont=document.getElementById('lst-items'); if(!cont) return;
  cont.querySelectorAll('.li-drag').forEach(function(h){
    h.addEventListener('pointerdown', function(e){
      e.preventDefault();
      const row=h.closest('.li-edit-row'); if(!row) return;
      const rows=Array.from(cont.querySelectorAll('.li-edit-row'));
      _liDrag={ listId, row, rows,
        centers:rows.map(r=>{const b=r.getBoundingClientRect(); return b.top+b.height/2;}),
        startY:e.clientY, fromIndex:rows.indexOf(row), toIndex:rows.indexOf(row) };
      row.classList.add('li-dragging');
      try{ h.setPointerCapture(e.pointerId); }catch(_){}
    });
    h.addEventListener('pointermove', function(e){
      if(!_liDrag) return;
      _liDrag.row.style.transform='translateY('+(e.clientY-_liDrag.startY)+'px)';
      let to=0;
      for(let i=0;i<_liDrag.centers.length;i++){ if(i===_liDrag.fromIndex) continue; if(e.clientY>_liDrag.centers[i]) to++; }
      _liDrag.toIndex=to;
    });
    const end=function(){
      if(!_liDrag) return;
      const d=_liDrag; _liDrag=null;
      d.row.classList.remove('li-dragging'); d.row.style.transform='';
      if(d.toIndex!==d.fromIndex){
        const L=state.lists.find(x=>x.id===d.listId);
        if(L&&L.items){ const mv=L.items.splice(d.fromIndex,1)[0]; L.items.splice(d.toIndex,0,mv); save(); render(); }
      }
      refreshListEditor(d.listId);
    };
    h.addEventListener('pointerup', end);
    h.addEventListener('pointercancel', end);
  });
}
function moveListItem(listId, itemId, dir){
  const L=state.lists.find(x=>x.id===listId); if(!L||!L.items) return;
  const i=L.items.findIndex(x=>x.id===itemId); if(i<0) return;
  const j=i+dir; if(j<0||j>=L.items.length) return;
  const t=L.items[i]; L.items[i]=L.items[j]; L.items[j]=t;
  save(); render(); refreshListEditor(listId);
}

function avBindForm(){
  const fi=document.getElementById('av-photo-file');
  if(fi) fi.onchange=function(e){
    const f=e.target.files[0]; if(!f) return;
    processPhoto(f, function(url){ _avPhoto=url; _avPreset=null; _avX=50; _avY=50; _avZoom=1; avRefreshFrame(); toast('\ud83d\uddbc\ufe0f Photo added!'); });
    e.target.value='';
  };
  const fr=document.getElementById('av-frame');
  if(fr){
    let dragging=false, sx=0, sy=0, ox=50, oy=50;
    fr.addEventListener('pointerdown', function(e){
      if(!_avPhoto) return;
      dragging=true; sx=e.clientX; sy=e.clientY; ox=_avX; oy=_avY;
      try{ fr.setPointerCapture(e.pointerId); }catch(_){}
      e.preventDefault();
    });
    fr.addEventListener('pointermove', function(e){
      if(!dragging) return;
      const rect=fr.getBoundingClientRect();
      const z=_avZoom||1;
      _avX=Math.min(100,Math.max(0, ox + (e.clientX-sx)/rect.width*100/z));
      _avY=Math.min(100,Math.max(0, oy + (e.clientY-sy)/rect.height*100/z));
      const img=document.getElementById('av-frame-img');
      if(img) img.style.transform='translate('+(_avX-50)+'%,'+(_avY-50)+'%) scale('+z+')';
    });
    const end=function(){ dragging=false; };
    fr.addEventListener('pointerup', end);
    fr.addEventListener('pointercancel', end);
  }
}

function processPhoto(file, cb){
  const reader=new FileReader();
  reader.onload=()=>{
    const img=new Image();
    img.onload=()=>{
      const MAX=480; let w=img.width, h=img.height;
      const scale=Math.min(1, MAX/Math.max(w,h));
      w=Math.max(1,Math.round(w*scale)); h=Math.max(1,Math.round(h*scale));
      const cv=document.createElement('canvas'); cv.width=w; cv.height=h;
      const ctx=cv.getContext('2d'); ctx.drawImage(img, 0, 0, w, h);
      cb(cv.toDataURL('image/jpeg',0.85));
    };
    img.onerror=()=>{ toast('⚠️ Could not read that image'); };
    img.src=reader.result;
  };
  reader.onerror=()=>{ toast('⚠️ Could not read that file'); };
  reader.readAsDataURL(file);
}

/* ---- badge catalogue ---- (repeat:true = tally-able; manualOnly:true = parent-given) */
const BADGES={
  ten_day:   {ico:'🔥', name:'Perfect 10',     desc:'10 tasks done in a single day', repeat:true, feature:true},
  week_streak:{ico:'📅', name:'7-Day Streak',  desc:'A full week without missing a routine', repeat:true, feature:true},
  fifty:     {ico:'🏅', name:'50 Club',        desc:'Earned 50 stars all-time', feature:true},
  hundred:   {ico:'💎', name:'Century',        desc:'Earned 100 stars all-time', feature:true},
  helper:    {ico:'🤝', name:'Family Helper',  desc:'Helped a family member out', manualOnly:true, repeat:true},
  kind:      {ico:'💗', name:'Kind Heart',     desc:'For being kind & thoughtful', manualOnly:true},
  tidy:      {ico:'🧹', name:'Super Tidy',     desc:'For going above and beyond on chores', manualOnly:true},
  star_helper:{ico:'⭐', name:'Star of the Week', desc:'Topped the leaderboard', manualOnly:true, repeat:true}
};
/* combined lookup incl. parent-made custom badges (always manual) */
function badgeDef(k){
  if(BADGES[k]) return BADGES[k];
  const c=(state.customBadges||[]).find(x=>x.key===k);
  return c?{ico:c.ico,name:c.name,desc:c.desc||'Custom badge',manualOnly:true,repeat:!!c.repeat,custom:true}:null;
}
function allBadgeKeys(){ return Object.keys(BADGES).concat((state.customBadges||[]).map(c=>c.key)); }
function manualBadgeKeys(){
  return Object.keys(BADGES).filter(k=>BADGES[k].manualOnly).concat((state.customBadges||[]).map(c=>c.key));
}
function badgeCount(memberId,b){ return state.badges.filter(x=>x.memberId===memberId && x.badge===b).length; }
function hasBadge(memberId,b){ return badgeCount(memberId,b)>0; }
/* award rules: lifetime badges only once; repeatable ones at most once per calendar month */
function awardBadge(memberId,b,manual){
  const def=badgeDef(b); if(!def) return false;
  if(!def.repeat){
    if(hasBadge(memberId,b)) return false;
  }else{
    const ym=todayYmd().slice(0,7);   /* YYYY-MM */
    const thisMonth=state.badges.some(x=>x.memberId===memberId && x.badge===b && (x.date||'').slice(0,7)===ym);
    if(thisMonth) return false;
  }
  state.badges.push({id:uid(), memberId, badge:b, date:todayYmd(), manual:!!manual});
  logActivity('badge',{memberId, label:(def.name||b)});
  return true;
}

/* ---- streaks: consecutive days (up to today) where every scheduled task was done ---- */
function dayComplete(memberId, ds){
  const routines=state.routines.filter(r=>r.memberId===memberId);
  let any=false;
  for(const r of routines){
    const vis=visibleTasks(r, ds);
    for(const t of vis){
      any=true;
      if(!(state.taskLog[ds] && state.taskLog[ds][t.id])) return false;
    }
  }
  return any; /* only counts if there was at least one task that day */
}
function currentStreak(memberId){
  let n=0, d=new Date();
  /* if today has no tasks yet/incomplete, start counting from yesterday so streak isn't broken mid-day */
  if(!dayComplete(memberId, ymd(d))){ d=addDays(d,-1); }
  for(let i=0;i<400;i++){
    if(dayComplete(memberId, ymd(d))){ n++; d=addDays(d,-1); }
    else break;
  }
  return n;
}

/* ---- auto-badge check (called after toggling a task) ---- */
function checkAutoBadges(memberId, ds){
  let earned=[];
  /* tasks completed that day */
  let dayCount=0;
  const log=state.taskLog[ds]||{};
  for(const tid in log){ if(log[tid]){ const h=taskById(tid); if(h&&h.routine.memberId===memberId) dayCount++; } }
  if(dayCount>=10 && awardBadge(memberId,'ten_day')) earned.push('ten_day');
  if(currentStreak(memberId)>=7 && awardBadge(memberId,'week_streak')) earned.push('week_streak');
  const tot=starsEarned(memberId);
  if(tot>=50 && awardBadge(memberId,'fifty')) earned.push('fifty');
  if(tot>=100 && awardBadge(memberId,'hundred')) earned.push('hundred');
  if(earned.length){ save(); }
  return earned;
}

/* ---- weekly figures (last 7 days incl. today) ---- */
function weekStats(memberId){
  let stars=0, tasks=0; const days=[];
  for(let i=6;i>=0;i--){
    const ds=ymd(addDays(new Date(),-i));
    let dStars=starsOnDate(memberId, ds), dTasks=0;
    const log=state.taskLog[ds]||{};
    for(const tid in log){ if(log[tid]){ const h=taskById(tid); if(h&&h.routine.memberId===memberId) dTasks++; } }
    for(const g of state.grabLog){ if(g.memberId===memberId && g.date===ds) dTasks++; }
    stars+=dStars; tasks+=dTasks;
    days.push({ds, stars:dStars, label:fromYmd(ds).toLocaleDateString('en-IN',{weekday:'narrow'})});
  }
  return {stars, tasks, days};
}

/* ---- leaderboard period helpers ---- */
function starsInPeriod(memberId, period){
  if(period==='all') return starsEarned(memberId);
  const days=period==='week'?7:30;
  let total=0;
  for(let i=0;i<days;i++){
    const ds=ymd(addDays(new Date(),-i));
    total+=starsOnDate(memberId, ds);
  }
  return total;
}

   ============================================================ */
/* sub completion is tracked per-day in taskLog under a sub key: "<taskId>::<subId>" */
function subKey(taskId, subId){ return taskId+'::'+subId; }
function subDone(ds, taskId, subId){ return !!(state.taskLog[ds] && state.taskLog[ds][subKey(taskId,subId)]); }
function toggleSub(taskId, subId){
  const ds=taskDate;
  if(!canEditDay(ds)){ dayBlockToast(ds); return; }
  if(blockedByPause()) return;
  state.taskLog[ds]=state.taskLog[ds]||{};
  const k=subKey(taskId,subId);
  state.taskLog[ds][k]=!state.taskLog[ds][k];
  /* if all subs now done -> mark parent done; if any unticked -> parent not done */
  const hit=taskById(taskId);
  if(hit && hit.task.subs && hit.task.subs.length){
    const allDone=hit.task.subs.every(s=>state.taskLog[ds][subKey(taskId,s.id)]);
    const wasDone=!!state.taskLog[ds][taskId];
    if(allDone && !wasDone){ save(); toggleTask(taskId); return; }      /* triggers parent completion + celebration */
    if(!allDone && wasDone){ state.taskLog[ds][taskId]=false; }
  }
  save(); render();
}

/* ---------- pause / lock ---------- */
function isPaused(){ return !!state.settings.paused; }
function togglePause(){ if(needParent()) return; state.settings.paused=!state.settings.paused; save(); render(); toast(state.settings.paused?'\u23f8\ufe0f Planner paused':'\u25b6\ufe0f Planner resumed'); }
function blockedByPause(){ if(isPaused()){ toast('\u23f8\ufe0f The planner is paused \u2014 ask '+vocab().roleA+' to resume'); return true; } return false; }
function pauseBanner(){ return '<div class="pause-banner"><span>\u23f8\ufe0f <b>Planner paused</b></span>'+(isParent()?'<button class="btn small gold" onclick="togglePause()">\u25b6\ufe0f Resume</button>':'<span class="muted" style="color:inherit">\u2014 ask a parent to resume</span>')+'</div>'; }

/* ---------- custom star values ---------- */
function stepStars(id,d){ const e=document.getElementById(id); if(!e) return; let v=(parseInt(e.value)||1)+d; if(v<1)v=1; if(v>999)v=999; e.value=v; }
function starChips(inputId){
  return '<div class="star-chips">'+[1,2,3,5,10].map(v=>'<button type="button" class="star-chip" onclick="var e=document.getElementById(\''+inputId+'\'); if(e) e.value='+v+'">\u2b50'+v+'</button>').join('')+'</div>';
}
function setDefaultStars(v){ state.settings.defaultStars=Math.max(1,parseInt(v)||1); save(); toast('\u2b50 New tasks now default to '+state.settings.defaultStars+' star'+(state.settings.defaultStars>1?'s':'')); }

/* ---------- spending limits ---------- */
function setSpendLimit(v){ state.settings.dailySpendLimit=Math.max(0,parseInt(v)||0); save(); render(); toast(state.settings.dailySpendLimit?('\ud83d\udea6 Daily spend limit: '+state.settings.dailySpendLimit+'\u2b50'):'\ud83d\udea6 Daily spend limit off'); }
function spentToday(memberId, ds){ ds=ds||todayYmd(); return state.redemptions.filter(r=>r.memberId===memberId && r.date===ds).reduce((s,r)=>s+(r.cost||0),0); }
function redeemCount(memberId, rewardId, period){
  const now=todayYmd();
  return state.redemptions.filter(r=>{
    if(r.memberId!==memberId || r.rewardId!==rewardId) return false;
    if(period==='day') return r.date===now;
    if(period==='week') return r.date<=now && (fromYmd(now)-fromYmd(r.date))/86400000 < 7;
    return true;
  }).length;
}
function rewardRemaining(memberId, r){ if(!r.limit) return Infinity; return Math.max(0, r.limit - redeemCount(memberId, r.id, r.limitPer||'day')); }

/* ---------- activity log ---------- */
const ACT_ICON={task_done:'\u2705', task_undone:'\u21a9\ufe0f', grab:'\ud83d\ude4c', redeem:'\ud83c\udf81', swap:'\ud83d\udd04', goal:'\ud83c\udf89', badge:'\ud83c\udfc6'};
function actVerb(a){
  switch(a.type){
    case 'task_done': return 'completed';
    case 'task_undone': return 'unticked';
    case 'grab': return 'grabbed';
    case 'redeem': return 'redeemed';
    case 'swap': return 'swapped chores';
    case 'goal': return 'celebrated goal';
    case 'badge': return 'earned badge';
    default: return a.type;
  }
}
function logActivity(type, data){
  state.activity=state.activity||[];
  state.activity.push(Object.assign({id:uid(), ts:Date.now(), date:todayYmd(), type}, data||{}));
  pruneActivity();
  if(state.activity.length>600) state.activity=state.activity.slice(-600);
}
/* recent activity is kept for 24 hours only — older entries are deleted */
function pruneActivity(){
  if(!state.activity || !state.activity.length) return false;
  const cutoff=Date.now()-86400000;
  const before=state.activity.length;
  state.activity=state.activity.filter(a=>(a.ts||0)>=cutoff);
  return state.activity.length!==before;
}
function clearActivityLog(){
  if(needParent()) return;
  if(!confirm('Clear the activity log? Stars, tasks and history are NOT affected.')) return;
  state.activity=[]; save(); render(); refreshStatsIfOpen(); toast('\ud83e\uddf9 Activity log cleared');
}
function relTime(ts){
  if(!ts) return '';
  const s=(Date.now()-ts)/1000;
  if(s<60) return 'just now';
  if(s<3600) return Math.floor(s/60)+'m ago';
  if(s<86400) return Math.floor(s/3600)+'h ago';
  const d=Math.floor(s/86400);
  if(d<7) return d+'d ago';
  return niceDate(ymd(new Date(ts)));
}
function tasksDoneOn(ds){ const a=state.taskLog[ds]||{}; let n=0; for(const k in a){ if(a[k] && k.indexOf('::')<0) n++; } return n; }
function ticksByWeekday(){
  const c=[0,0,0,0,0,0,0];
  for(const date in state.taskLog) c[fromYmd(date).getDay()]+=tasksDoneOn(date);
  return c;
}
function ticksByHour(){
  const c=new Array(24).fill(0);
  for(const a of (state.activity||[])) if(a.type==='task_done' && a.ts) c[new Date(a.ts).getHours()]++;
  return c;
}
function renderWeeklyOverview(){
  let wkCols='';
  for(const m of state.members){
    const w=weekStats(m.id);
    const max=Math.max(1,...w.days.map(d=>d.stars));
    const bars=w.days.map(d=>'<div class="wk-bar" style="height:'+Math.round((d.stars/max)*54+3)+'px"><span>'+d.label+'</span></div>').join('');
    wkCols+='<div class="pcol"><div class="pcol-head" style="background:'+m.color+';color:'+textOn(m.color)+'">'+
      memberChip(m)+'<div><div class="pname">'+esc(m.name)+'</div>'+
      '<div class="pstars">\ud83d\udd25 '+currentStreak(m.id)+'-day streak</div></div></div>'+
      '<div class="pcol-body"><div class="wk-stat">'+
      '<div class="wk-card"><div class="wkn">\u2b50'+fmtStars(w.stars)+'</div><div class="wkl">stars this week</div></div>'+
      '<div class="wk-card"><div class="wkn">'+w.tasks+'</div><div class="wkl">tasks done</div></div></div>'+
      '<div class="wk-bars">'+bars+'</div></div></div>';
  }
  return '<div class="section-title" style="margin-top:14px">\ud83d\udcca This week by person</div><div class="cols">'+wkCols+'</div>';
}
function renderStatsContent(){
  const parent=isParent();
  let famTasks=0; for(let i=0;i<7;i++) famTasks+=tasksDoneOn(ymd(addDays(new Date(),-i)));
  const famStars=state.members.reduce((s,m)=>s+starsInPeriod(m.id,'week'),0);

  let bestStreak=0,streakM=null; for(const m of state.members){ const v=currentStreak(m.id); if(v>bestStreak){ bestStreak=v; streakM=m; } }
  const summary='<div class="card"><div class="section-title">\ud83d\udcca This week</div>'+
    '<div class="act-stats">'+
    '<div class="act-stat"><div class="asn">'+famTasks+'</div><div class="asl">tasks done</div></div>'+
    '<div class="act-stat"><div class="asn">\u2b50'+fmtStars(famStars)+'</div><div class="asl">stars earned</div></div>'+

    '<div class="act-stat"><div class="asn">'+(bestStreak>0?('\ud83d\udd25'+bestStreak):'\u2014')+'</div><div class="asl">'+(streakM&&bestStreak>0?esc(streakM.name)+'\u2019s streak':'best streak')+'</div></div>'+
    '</div></div>';
  const wd=ticksByWeekday(), wdMax=Math.max(1,...wd);
  const order=[1,2,3,4,5,6,0], lab=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const wdBars=order.map((i,k)=>'<div class="act-col"><div class="act-bar" style="height:'+Math.round(wd[i]/wdMax*70+4)+'px" title="'+wd[i]+' tasks"></div><div class="act-lab">'+lab[k]+'</div></div>').join('');
  const hrs=ticksByHour(), hasHr=hrs.some(h=>h>0), hrMax=Math.max(1,...hrs);
  const hrBars=hasHr?hrs.map((h,i)=>'<div class="act-col"><div class="act-bar alt" style="height:'+Math.round(h/hrMax*58+3)+'px" title="'+h+' ticks at '+i+':00"></div><div class="act-lab">'+(i%6===0?i:'')+'</div></div>').join(''):'';
  const patterns='<div class="card" style="margin-top:14px"><div class="section-title">\ud83d\udcc8 Patterns</div>'+
    '<div class="muted" style="font-weight:700;margin-bottom:2px">Tasks completed by weekday <span style="font-weight:400">(all time)</span></div>'+
    '<div class="act-chart">'+wdBars+'</div>'+
    (hasHr?'<div class="muted" style="font-weight:700;margin:14px 0 2px">By time of day <span style="font-weight:400">(since logging began)</span></div><div class="act-chart">'+hrBars+'</div>':'')+
    '</div>';
  if(pruneActivity()) save();
  const items=(state.activity||[]).slice(-40).reverse();
  const feed=items.length? items.map(a=>{
    const m=a.memberId?member(a.memberId):null;
    const ic=ACT_ICON[a.type]||'\u2022';
    const star=a.stars?(' <span class="muted">'+(a.stars>0?'+':'')+'\u2b50'+a.stars+'</span>'):'';
    return '<div class="history-item"><span style="font-size:1.1rem">'+ic+'</span>'+
      '<div>'+(m?'<b>'+esc(m.name)+'</b> ':'')+esc(actVerb(a))+' <b>'+esc(a.label||'')+'</b>'+star+
      '<div class="muted">'+relTime(a.ts)+'</div></div></div>';
  }).join('') : '<div class="muted">Nothing in the last 24 hours. Ticks, redemptions, swaps, goals and badges appear here, then clear after a day.</div>';
  const feedCard='<div class="card" style="margin-top:14px"><div class="section-title">\ud83e\uddfe Recent activity <span class="muted" style="font-weight:600;font-size:.7rem">(last 24h)</span>'+
    (parent&&items.length?'<span class="spacer"></span><button class="btn ghost small" onclick="clearActivityLog()">Clear log</button>':'')+'</div>'+feed+'</div>';
  const insArr=periodInsights(statsPeriod);
  const insBtns=[['week','This week'],['month','This month'],['all','All time']].map(a=>
    '<button class="btn small'+(statsPeriod===a[0]?' gold':' ghost')+'" onclick="setStatsPeriod(\''+a[0]+'\')">'+a[1]+'</button>').join(' ');
  const insCard='<div class="card" style="margin-top:14px"><div class="section-title">\ud83d\udca1 Insights</div>'+
    '<div class="row" style="flex-wrap:wrap;gap:6px;margin-bottom:10px">'+insBtns+'</div>'+
    insArr.map(s=>'<p style="margin:0 0 8px;font-weight:600;line-height:1.45">'+s+'</p>').join('')+'</div>';
  const redCard=(function(){
    const reds=state.redemptions.filter(r=>{ if(statsPeriod==='all') return true; const d=(fromYmd(todayYmd())-fromYmd(r.date))/86400000; return d < (statsPeriod==='month'?30:7); });
    const title='<div class="section-title">🎁 Reward redemptions <span class="muted" style="font-weight:600;font-size:.7rem">('+(statsPeriod==='all'?'all time':'this '+statsPeriod)+')</span></div>';
    if(!reds.length) return '<div class="card" style="margin-top:14px">'+title+'<div class="muted">No redemptions in this period.</div></div>';
    const byReward={};
    reds.forEach(r=>{ byReward[r.name]=(byReward[r.name]||0)+1; });
    const rewardRows=Object.keys(byReward).sort((a,b)=>byReward[b]-byReward[a]).map(n=>'<div class="history-item"><span style="font-size:1.1rem">🎁</span><div><b>'+esc(n)+'</b> · '+byReward[n]+'×</div></div>').join('');
    const recent=reds.slice(-12).reverse().map(r=>{ const m=member(r.memberId); return '<div class="history-item">'+iconHtml(r,18)+'<div><b>'+esc(m?m.name:'?')+'</b> redeemed <b>'+esc(r.name)+'</b><div class="muted">'+niceDate(r.date)+' · ⭐'+r.cost+'</div></div></div>'; }).join('');
    return '<div class="card" style="margin-top:14px">'+title+
      '<div class="muted" style="margin-bottom:4px">'+reds.length+' redemption'+(reds.length===1?'':'s')+' total</div>'+
      '<div style="font-weight:800;font-size:.7rem;text-transform:uppercase;letter-spacing:.5px;margin:8px 0 2px;color:var(--ink-soft)">Most popular</div>'+rewardRows+
      '<div style="font-weight:800;font-size:.7rem;text-transform:uppercase;letter-spacing:.5px;margin:10px 0 2px;color:var(--ink-soft)">Recent</div>'+recent+'</div>';
  })();
  return summary + renderWeeklyOverview() + patterns + (parent?redCard:'') + feedCard + insCard;
}
/* ---------- full-screen stats view ---------- */
let statsPeriod='week';
function setStatsPeriod(p){ statsPeriod=p; refreshStatsIfOpen(); }
function openStats(){
  const b=document.getElementById('stats-body'); if(b) b.innerHTML=renderStatsContent();

}

function refreshStatsIfOpen(){

}
/* ---------- plain-language insights for a period: 'week' | 'month' | 'all' ---------- */
function periodLabel(p){ return p==='all'?'all-time':(p==='month'?'this month':'this week'); }
function periodInsights(period){
  period=(period==='month'||period==='all')?period:'week';
  const N=period==='week'?7:(period==='month'?30:365);
  const PL=periodLabel(period), G=esc(vocab().group), unit=(period==='month'?'month':'week');
  const sent=[];
  /* tasks done in the period */
  let thisP=0;
  if(period==='all'){ for(const ds in state.taskLog) thisP+=tasksDoneOn(ds); }
  else { for(let i=0;i<N;i++) thisP+=tasksDoneOn(ymd(addDays(new Date(),-i))); }
  const famStars=state.members.reduce((s,m)=>s+starsInPeriod(m.id,period),0);
  if(thisP===0 && famStars===0){ return ['No tasks have been completed '+PL+' yet \u2014 a fresh start awaits! \uD83C\uDF31']; }
  /* trend vs the previous period (not for all-time) */
  let trend='';
  if(period!=='all'){
    let prevP=0; for(let i=N;i<2*N;i++) prevP+=tasksDoneOn(ymd(addDays(new Date(),-i)));
    if(prevP>0){
      if(thisP>prevP) trend=' \u2014 up from '+prevP+' the '+unit+' before \uD83D\uDCC8';
      else if(thisP<prevP) trend=' \u2014 down from '+prevP+' the '+unit+' before';
      else trend=' \u2014 the same as the '+unit+' before';
    }
  }
  sent.push(G+' completed '+thisP+' task'+(thisP!==1?'s':'')+' and earned \u2b50 '+fmtStars(famStars)+' '+PL+trend+'.');
  /* most active */
  let topM=null, topV=-1;
  for(const m of state.members){ const v=starsInPeriod(m.id,period); if(v>topV){ topV=v; topM=m; } }
  if(topM && topV>0) sent.push(esc(topM.name)+' led the way with \u2b50 '+fmtStars(topV)+' '+PL+'.');
  /* busiest weekday */
  let wd;
  if(period==='all'){ wd=ticksByWeekday(); }
  else { wd=[0,0,0,0,0,0,0]; for(let i=0;i<N;i++){ const d=addDays(new Date(),-i); wd[d.getDay()]+=tasksDoneOn(ymd(d)); } }
  let bi=-1, bv=0; for(let i=0;i<7;i++){ if(wd[i]>bv){ bv=wd[i]; bi=i; } }
  const DOWf=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  if(bi>=0 && bv>0){
    sent.push(period==='week'
      ? DOWf[bi]+' was the busiest day, with '+bv+' task'+(bv!==1?'s':'')+' done.'
      : DOWf[bi]+'s tend to be the busiest, with '+bv+' task'+(bv!==1?'s':'')+' done '+PL+'.');
  }
  /* longest current streak */
  let bestStreak=0, streakM=null;
  for(const m of state.members){ const v=currentStreak(m.id); if(v>bestStreak){ bestStreak=v; streakM=m; } }
  if(bestStreak>0) sent.push(esc(streakM.name)+' is on the longest streak at \uD83D\uDD25 '+bestStreak+' day'+(bestStreak!==1?'s':'')+'.');
  /* most-skipped task (scheduled but not completed) within the period */
  const miss={};
  for(let i=1;i<=N;i++){
    const ds=ymd(addDays(new Date(),-i));
    for(const r of state.routines) for(const t of visibleTasks(r, ds)){
      if(!(state.taskLog[ds] && state.taskLog[ds][t.id])) miss[t.title]=(miss[t.title]||0)+1;
    }
  }
  let missT=null,missV=0; for(const k in miss){ if(miss[k]>missV){ missV=miss[k]; missT=k; } }
  if(missT && missV>0) sent.push('\u201c'+esc(missT)+'\u201d was missed most often \u2014 left undone '+missV+' time'+(missV!==1?'s':'')+' '+PL+'. \u23f3');
  /* favourite reward within the period */
  function _topReward(list){ const c={}; for(const r of list){ const n=r.name||'?'; c[n]=(c[n]||0)+1; } let rn=null,rv=0; for(const k in c){ if(c[k]>rv){ rv=c[k]; rn=k; } } return rn?{name:rn,count:rv}:null; }
  let reds=state.redemptions||[];
  if(period!=='all'){ const start=ymd(addDays(new Date(),-(N-1))); reds=reds.filter(r=>(r.date||'')>=start); }
  const tr=_topReward(reds);
  if(tr) sent.push('\uD83C\uDF81 \u201c'+esc(tr.name)+'\u201d was the favourite reward '+PL+' ('+tr.count+' time'+(tr.count!==1?'s':'')+').');
  return sent;
}
function weekInsights(){ return periodInsights('week'); }

    '<div class="pr-card"><div class="pr-cn">'+(bestStreak>0?('\uD83D\uDD25'+bestStreak):'\u2014')+'</div><div class="pr-cl">'+(streakM&&bestStreak>0?esc(streakM.name)+'\u2019s streak':'best streak')+'</div></div>'+

    html+='<div class="pr-person">'+
      '<div class="pr-pleft" style="border-left:6px solid '+m.color+'">'+
      '<div class="pr-pname">'+esc(m.name)+'</div>'+
      '<div class="pr-pstats">\u2b50 '+fmtStars(w.stars)+' this week \u00b7 '+w.tasks+' task'+(w.tasks!==1?'s':'')+' \u00b7 \uD83D\uDD25 '+currentStreak(m.id)+'d \u00b7 all-time \u2b50 '+fmtStars(starsEarned(m.id))+'</div>'+
      '</div>'+
      '<div class="pr-chart">'+bars+'</div>'+
      '</div>';
  }
  /* weekday distribution (all time) */
  const wd=ticksByWeekday(), wdMax=Math.max(1,...wd), order=[1,2,3,4,5,6,0], lab=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  html+='<div class="pr-h">Tasks completed by weekday (all time)</div>'+
    '<div class="pr-chart wide">'+order.map((i,k)=>'<div class="pr-barwrap"><div class="pr-bar" style="height:'+Math.round(wd[i]/wdMax*60+2)+'px;background:#7AA06A"></div><div class="pr-bl">'+lab[k]+'</div></div>').join('')+'</div>';
  /* insights (reflect the currently selected period) */
  const insLabel=statsPeriod==='all'?'All-time at a glance':(statsPeriod==='month'?'This month at a glance':'This week at a glance');
  html+='<div class="pr-insights"><div class="pr-ih">\uD83D\uDCA1 '+insLabel+'</div>'+
    periodInsights(statsPeriod).map(s=>'<div class="pr-iline">'+s+'</div>').join('')+'</div>';
  return html;
}

function openWelcome(){
  openModal(

const GSYNC_CLIENT_ID='956849465059-h1re1lh5ueh56n96jfcahb2gq284lp8c.apps.googleusercontent.com';
const GSYNC_SCOPE='https://www.googleapis.com/auth/drive.appdata';

  if(!document.getElementById('gsi-lib')){ const s=document.createElement('script'); s.id='gsi-lib'; s.src='https://accounts.google.com/gsi/client'; s.async=true; s.defer=true; document.head.appendChild(s); }

function gsSilentToken(cb){
  const c=gsCachedToken(); if(c){ cb(c); return; }

function gsApi(token,url,opts){ opts=opts||{}; opts.headers=Object.assign({Authorization:'Bearer '+token}, opts.headers||{}); return fetch(url,opts); }

function gsAdopt(remote, rTs){ state=normalize(remote.state); save(); try{ localStorage.setItem('starkle_local_ts', String(rTs)); }catch(e){} render(); }

function gsConnect(){ gsGetToken(true, function(token){ if(!token){ toast('\u26a0\ufe0f Couldn\u2019t connect to Google'); return; } localStorage.setItem('starkle_sync_on','1'); refreshSyncUI(); gsFirstSync(token); }); }
function gsFirstSync(token){

    if(!file){ return gsUploadCreate(token, gsPayload(gsLocalTs()||Date.now())).then(function(res){ if(res&&res.id) localStorage.setItem('starkle_sync_fileid',res.id); toast('\u2601\ufe0f Backed up to your Drive'); }); }
    localStorage.setItem('starkle_sync_fileid', file.id);
    return gsDownload(token, file.id).then(function(txt){ let remote=null; try{ remote=JSON.parse(txt); }catch(e){}
      if(remote && remote.state){ gsAdopt(remote, remote.ts||Date.now()); toast('\u2601\ufe0f Loaded your planner from Drive'); }
      else { return gsUploadUpdate(token, file.id, gsPayload(gsLocalTs()||Date.now())).then(function(){ toast('\u2601\ufe0f Backed up to your Drive'); }); }
    });
  }).catch(function(e){ console.error('connect',e); toast('\u26a0\ufe0f Connect failed \u2014 try again'); }).then(function(){ _gsBusy=false; refreshSyncUI(); });
}
function gsDisconnect(){ const t=gsCachedToken(); try{ if(t && window.google && google.accounts && google.accounts.oauth2) google.accounts.oauth2.revoke(t,function(){}); }catch(e){} gsClearToken(); localStorage.removeItem('starkle_sync_on'); localStorage.removeItem('starkle_sync_fileid'); toast('\u2601\ufe0f Disconnected from Drive'); refreshSyncUI(); }

function gsSyncNow(){
  if(_gsBusy) return;
  gsGetToken(true, function(token){
    if(!token){ toast('\u26a0\ufe0f Google sign-in needed'); return; }
    localStorage.setItem('starkle_sync_on','1'); _gsBusy=true; refreshSyncUI(); toast('\u2601\ufe0f Syncing\u2026');
    gsFindFile(token).then(function(file){
      if(!file){ return gsUploadCreate(token, gsPayload(gsLocalTs()||Date.now())).then(function(res){ if(res&&res.id) localStorage.setItem('starkle_sync_fileid',res.id); toast('\u2601\ufe0f Backed up to your Drive'); }); }
      localStorage.setItem('starkle_sync_fileid', file.id);
      return gsDownload(token, file.id).then(function(txt){
        let remote=null; try{ remote=JSON.parse(txt); }catch(e){}

        if(remote && remote.state && rTs>lTs){ gsAdopt(remote, rTs); toast('\u2601\ufe0f Pulled the latest from Drive'); }
        else { return gsUploadUpdate(token, file.id, gsPayload(lTs||Date.now())).then(function(){ toast('\u2601\ufe0f Your changes are saved to Drive'); }); }
      });
    }).catch(function(e){ console.error('sync',e); toast('\u26a0\ufe0f Sync failed \u2014 try again'); })
      .then(function(){ _gsBusy=false; refreshSyncUI(); });
  });
}
function gsAutoPull(){
  if(!gsOn()) return; const token=gsCachedToken(); if(!token) return;
  gsFindFile(token).then(function(file){ if(!file) return; localStorage.setItem('starkle_sync_fileid', file.id);
    return gsDownload(token, file.id).then(function(txt){ let remote=null; try{ remote=JSON.parse(txt); }catch(e){} const rTs=(remote&&remote.ts)||0, lTs=gsLocalTs()||0; if(remote&&remote.state&&rTs>lTs){ gsAdopt(remote,rTs); toast('\u2601\ufe0f Updated from your other device'); } });
  }).catch(function(){});
}
function gsSchedulePush(){ if(!gsOn()) return; if(_gsPushTimer) clearTimeout(_gsPushTimer); _gsPushTimer=setTimeout(function(){ _gsPushTimer=null; gsAutoSync(); }, 2500); }
function gsAutoSync(){
  if(!gsOn() || _gsBusy) return;
  gsSilentToken(function(token){
    if(!token) return;   /* couldn't refresh silently; will retry next open/timer */
    _gsBusy=true;
    gsFindFile(token).then(function(file){
      if(!file){ return gsUploadCreate(token, gsPayload(gsLocalTs()||Date.now())).then(function(res){ if(res&&res.id) localStorage.setItem('starkle_sync_fileid',res.id); }); }
      localStorage.setItem('starkle_sync_fileid', file.id);
      return gsDownload(token,file.id).then(function(txt){
        let remote=null; try{ remote=JSON.parse(txt); }catch(e){}
        const rTs=(remote&&remote.ts)||0, lTs=gsLocalTs()||0;
        if(remote&&remote.state&&rTs>lTs){ gsAdopt(remote,rTs); toast('\u2601\ufe0f Updated from your other device'); }
        else if(lTs>rTs){ return gsUploadUpdate(token,file.id,gsPayload(lTs)); }
      });
    }).catch(function(){}).then(function(){ _gsBusy=false; });
  });
}
function syncCardHtml(){
  return '<div class="section-title">\u2601\ufe0f Google Drive sync</div>'+
    '<div class="muted" style="margin-bottom:10px">Keep your planner in step across devices by saving it to your own Google Drive (private to your account).</div>'+

const FB_CONFIG={apiKey:"AIzaSyBBnBxKjgH_9y6myhUOZyCf0yNdepn7Fls",authDomain:"starkle-a4c8c.firebaseapp.com",projectId:"starkle-a4c8c",storageBucket:"starkle-a4c8c.firebasestorage.app",messagingSenderId:"717573908839",appId:"1:717573908839:web:dd24e312279bddba5627c2"};
const FB_TS='starkle_fb_ts';
let _fbReady=false,_fbUser=null,_fbDb=null,_fbUnsub=null,_fbPushTimer=null,_fbApplying=false,_fbTries=0,_fbBooting=true,_fbSynced=false,_fbDirty=false;
function fbLocalTs(){ return parseInt(localStorage.getItem(FB_TS)||'0')||0; }
function fbSetTs(v){ try{ localStorage.setItem(FB_TS,String(v)); }catch(e){} }
function fbWriteLocal(){ try{ localStorage.setItem(LS_KEY, JSON.stringify(state)); }catch(e){} }
function fbInit(){
  if(_fbReady) return;
  if(!(window.firebase && firebase.initializeApp)){ if(_fbTries++<40) setTimeout(fbInit,300); return; }
  try{ firebase.initializeApp(FB_CONFIG); }catch(e){}

  const standalone=(window.matchMedia&&window.matchMedia('(display-mode: standalone)').matches)||window.navigator.standalone===true;
  if(standalone){ firebase.auth().signInWithRedirect(p).catch(function(e){ toast('\u26a0\ufe0f Sign-in failed: '+((e&&e.code)||'error')); }); return; }

function fbDocRef(){ return _fbDb.collection('planners').doc(_fbUser.uid); }
