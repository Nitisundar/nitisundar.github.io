<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#141019">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Chic">
<title>Chic — Your Wardrobe</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Italiana&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#1A1521; --surf:#241E2F; --surf2:#2F273C; --text:#EDE9F2; --mut:#9B93A8;
  --acc:#C9B8FF; --acc-ink:#141019; --acc2:#E3C9A0; --line:rgba(255,255,255,.08);
  --danger:#E07070; --acc2-ink:#141019; --shadow:0 8px 30px rgba(0,0,0,.45); --r:18px;
}
html[data-theme="light"]{
  --bg:#DCD3E8; --surf:#F0EBF6; --surf2:#CDC2DD; --text:#221D2B; --mut:#6E6680;
  --acc:#7A5CC9; --acc-ink:#FFFFFF; --acc2:#A8823F; --line:rgba(20,10,40,.1);
  --danger:#C05050; --acc2-ink:#FFFFFF; --shadow:0 8px 26px rgba(60,40,110,.14);
}
/* ---- palettes ---- */
html[data-pal="coffee"]{
  --bg:#231911; --surf:#302317; --surf2:#3D2C1F; --text:#F2E8DD; --mut:#A8927E;
  --acc:#E89A3C; --acc-ink:#241408; --acc2:#D9B98A; --line:rgba(255,235,210,.09);
}
html[data-pal="coffee"][data-theme="light"]{
  --bg:#ECE1CF; --surf:#FAF5EC; --surf2:#E0D2BB; --text:#2C1E12; --mut:#8A7460;
  --acc:#A05E1E; --acc-ink:#FFFFFF; --acc2:#8A6A3F; --line:rgba(70,40,10,.12);
  --shadow:0 8px 26px rgba(90,60,20,.14);
}
html[data-pal="navy"]{
  --bg:#141D2C; --surf:#1D283D; --surf2:#27334B; --text:#E7EDF6; --mut:#8B99B0;
  --acc:#8AB4F8; --acc-ink:#0C1524; --acc2:#D9C08A; --line:rgba(200,220,255,.09);
}
html[data-pal="navy"][data-theme="light"]{
  --bg:#DFE7F1; --surf:#F6F9FD; --surf2:#D2DCEA; --text:#17233A; --mut:#5F7089;
  --acc:#2B5FA8; --acc-ink:#FFFFFF; --acc2:#8A6A3F; --line:rgba(20,50,100,.12);
  --shadow:0 8px 26px rgba(30,60,120,.13);
}
html[data-pal="forest"]{
  --bg:#17231B; --surf:#213028; --surf2:#2C3D32; --text:#E9F1EA; --mut:#8FA895;
  --acc:#8AD6A5; --acc-ink:#0E1A12; --acc2:#D8C08A; --line:rgba(210,240,215,.09);
}
html[data-pal="forest"][data-theme="light"]{
  --bg:#DFECE2; --surf:#F5FAF6; --surf2:#D2E2D6; --text:#1B2A1F; --mut:#5F7A66;
  --acc:#2E7D4F; --acc-ink:#FFFFFF; --acc2:#8A6A3F; --line:rgba(20,70,40,.12);
  --shadow:0 8px 26px rgba(30,90,50,.13);
}
html[data-pal="noir"]{
  --bg:#1B191E; --surf:#25222A; --surf2:#302C36; --text:#F0EDF2; --mut:#9C96A3;
  --acc:#E8A0B4; --acc-ink:#221218; --acc2:#CFC9D6; --line:rgba(255,240,250,.08);
}
html[data-pal="noir"][data-theme="light"]{
  --bg:#D9D2DF; --surf:#EFEBF2; --surf2:#CAC2D2; --text:#242028; --mut:#726B7A;
  --acc:#B4506E; --acc-ink:#FFFFFF; --acc2:#7A7383; --line:rgba(50,20,40,.11);
  --shadow:0 8px 26px rgba(120,50,80,.12);
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
html{font-size:19px}
body{margin:0; background:var(--bg); color:var(--text); font-family:'Jost',system-ui,sans-serif;
  font-weight:400; letter-spacing:.01em; transition:background .3s,color .3s; padding-bottom:86px;
  overscroll-behavior-y:contain}
h1,h2,h3{font-weight:400; margin:0}
button{font-family:inherit; color:inherit; background:none; border:none; cursor:pointer; font-size:1rem}
input,select,textarea{font-family:inherit; font-size:1rem; color:var(--text); background:var(--surf2);
  border:1px solid var(--line); border-radius:12px; padding:10px 12px; width:100%; outline:none}
input:focus,select:focus{border-color:var(--acc)}
::placeholder{color:var(--mut)}
img{-webkit-user-drag:none; user-select:none}

/* ---------- header ---------- */
header{display:flex; justify-content:center; padding:calc(34px + env(safe-area-inset-top)) 20px 4px}
.wordmark{font-family:'Italiana',serif; font-size:2rem; letter-spacing:.32em; text-transform:uppercase;
  font-weight:700; -webkit-text-stroke:.6px currentColor; text-indent:.32em; white-space:nowrap}
.wordmark span{color:var(--acc)}
.hbtns{display:flex; gap:6px}
.iconbtn{width:40px;height:40px;border-radius:50%;display:grid;place-items:center;background:var(--surf);
  border:1px solid var(--line); font-size:1.05rem}
.tagline{padding:0 20px 12px; color:var(--mut); font-size:.82rem; letter-spacing:.14em; text-transform:uppercase; text-align:center}
.topbar{display:flex; justify-content:center; gap:12px; padding:0 20px 12px}

/* ---------- tab bar ---------- */
nav{position:fixed; bottom:0; left:0; right:0; z-index:40; background:color-mix(in srgb,var(--surf) 88%, transparent);
  backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px); border-top:1px solid var(--line);
  display:flex; padding:8px 8px calc(8px + env(safe-area-inset-bottom))}
nav button{flex:1; display:flex; flex-direction:column; align-items:center; gap:2px; padding:6px 0;
  color:var(--mut); font-size:.68rem; letter-spacing:.1em; text-transform:uppercase; border-radius:14px}
nav button .ni{font-size:1.25rem; line-height:1}
nav button.on{color:var(--acc)}
nav button:focus-visible{outline:2px solid var(--acc)}

/* ---------- chips & filters ---------- */
.chiprow{display:flex; gap:8px; overflow-x:auto; padding:6px 20px 12px; scrollbar-width:none}
.chiprow::-webkit-scrollbar{display:none}
.chip{flex:0 0 auto; padding:7px 16px; border-radius:999px; background:var(--surf); border:1px solid var(--line);
  color:var(--mut); font-size:.85rem; letter-spacing:.04em; transition:all .15s}
.chip.on{background:var(--acc); color:var(--acc-ink); border-color:var(--acc)}
.chip.mini{padding:5px 12px; font-size:.78rem}
.cdot{display:inline-block;width:12px;height:12px;border-radius:50%;margin-right:6px;vertical-align:-1px;border:1px solid var(--line)}
.searchbar{display:flex; align-items:center; gap:8px; margin:6px 20px 2px; background:var(--surf); border:1px solid var(--line); border-radius:999px; padding:0 14px}
.searchbar span{color:var(--acc2); font-size:1.1rem}
.searchbar input{border:none; background:none; padding:11px 0; border-radius:0}
.searchbar input:focus{border:none}
.searchbar button{color:var(--mut); font-size:.9rem; padding:6px}
.filters{display:flex; gap:8px; padding:6px 20px 2px}
.filters select{flex:1; min-width:0; padding:9px 10px; border-radius:999px; background:var(--surf);
  font-size:.82rem; appearance:none; text-align:center; text-align-last:center}

/* ---------- closet grid ---------- */
.grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:14px; padding:4px 20px 20px}
.card{background:var(--surf); border-radius:var(--r); overflow:hidden; border:1px solid var(--line);
  position:relative; box-shadow:var(--shadow); cursor:pointer}
.card .ph{aspect-ratio:3/4; width:100%; object-fit:cover; display:block; background:var(--surf2)}
.card .meta{padding:9px 12px 11px}
.card .nm{font-size:.9rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
.card .sub{font-size:.72rem; color:var(--mut); letter-spacing:.08em; text-transform:uppercase; margin-top:2px;
  display:flex; align-items:center; gap:6px}
.badge{position:absolute; top:8px; left:8px; background:rgba(0,0,0,.55); color:#fff; backdrop-filter:blur(4px);
  font-size:.68rem; padding:4px 9px; border-radius:999px; letter-spacing:.06em}
.favtag{position:absolute; top:8px; right:8px; font-size:1rem; color:var(--acc2); filter:drop-shadow(0 1px 2px rgba(0,0,0,.5))}
.empty{padding:60px 30px; text-align:center; color:var(--mut)}
.empty .big{font-family:'Italiana',serif; font-size:1.6rem; color:var(--text); margin-bottom:8px}

.nudge{margin:2px 20px 10px; padding:11px 14px; border-radius:14px; font-size:.86rem;
  background:color-mix(in srgb, var(--acc) 14%, var(--surf)); border:1px solid color-mix(in srgb, var(--acc) 35%, transparent);
  display:flex; align-items:center; gap:10px; justify-content:space-between}
.nudge button{color:var(--mut); flex:0 0 auto}
/* ---------- FAB ---------- */
.fab{position:fixed; right:18px; bottom:calc(92px + env(safe-area-inset-bottom)); z-index:41; width:58px; height:58px;
  border-radius:50%; background:var(--acc2); color:var(--acc2-ink); font-size:1.7rem; box-shadow:var(--shadow);
  display:grid; place-items:center; transition:transform .15s}
.fab:active{transform:scale(.92)}

/* ---------- sheets / modals ---------- */
.veil{position:fixed; inset:0; background:rgba(0,0,0,.55); z-index:60; opacity:0; pointer-events:none; transition:opacity .25s}
.veil.open{opacity:1; pointer-events:auto}
.sheet{position:fixed; left:0; right:0; bottom:0; z-index:61; background:var(--bg); border-radius:26px 26px 0 0;
  max-height:92dvh; overflow-y:auto; transform:translateY(105%); transition:transform .3s cubic-bezier(.3,.9,.3,1);
  padding:10px 20px calc(26px + env(safe-area-inset-bottom)); border-top:1px solid var(--line)}
.sheet.open{transform:translateY(0)}
.grab{width:44px;height:4px;border-radius:4px;background:var(--line);margin:6px auto 14px}
.sheet h2{font-family:'Italiana',serif; font-size:1.5rem; letter-spacing:.08em; margin-bottom:14px}
.frow{margin-bottom:14px}
.frow label{display:block; font-size:.74rem; color:var(--mut); letter-spacing:.14em; text-transform:uppercase; margin-bottom:7px}
.wrapchips{display:flex; flex-wrap:wrap; gap:8px}
.pickph{width:100%; aspect-ratio:3/2; border-radius:16px; border:1.5px dashed var(--line); background:var(--surf);
  display:grid; place-items:center; color:var(--mut); overflow:hidden; position:relative}
.pickph img{width:100%; height:100%; object-fit:cover; position:absolute; inset:0}
.btn{display:block; width:100%; text-align:center; padding:14px; border-radius:14px; background:var(--acc);
  color:var(--acc-ink); font-weight:500; letter-spacing:.08em; text-transform:uppercase; font-size:.9rem}
.btn.ghost{background:var(--surf); color:var(--text); border:1px solid var(--line)}
.btn.ghost.on{border-color:var(--acc); color:var(--acc)}
.btn.danger{background:transparent; color:var(--danger); border:1px solid var(--danger)}
.btn:disabled{opacity:.4}
.row2{display:flex; gap:10px}
.row2>*{flex:1}

/* ---------- detail ---------- */
.dph{width:100%; aspect-ratio:3/4; object-fit:cover; border-radius:18px; background:var(--surf2)}
.dtitle{font-family:'Italiana',serif; font-size:1.6rem; margin:14px 0 2px}
.dsub{color:var(--mut); font-size:.8rem; letter-spacing:.12em; text-transform:uppercase; margin-bottom:12px}
.stars{display:flex; gap:6px; font-size:1.5rem; margin:8px 0 14px}
.stars button{color:var(--mut)} .stars button.on{color:var(--acc2)}
.statline{display:flex; gap:10px; margin-bottom:14px}
.stat{flex:1; background:var(--surf); border:1px solid var(--line); border-radius:14px; padding:10px; text-align:center}
.stat .v{font-size:1.15rem} .stat .k{font-size:.66rem; color:var(--mut); letter-spacing:.12em; text-transform:uppercase}

/* ---------- studio (zoom deck) ---------- */
.studio{padding:0 0 10px; position:relative}
.slotchips{display:flex; gap:8px; overflow-x:auto; padding:2px 20px 10px; scrollbar-width:none}
.slotchips::after{content:""; flex:0 0 12px}
.slotchips::-webkit-scrollbar{display:none}
.slotchips .chip{position:relative}
.slotchips .chip.done::after{content:""; position:absolute; top:4px; right:8px; width:6px; height:6px;
  border-radius:50%; background:var(--acc2)}
.deck{display:flex; gap:16px; overflow-x:auto; scroll-snap-type:x mandatory; padding:14px calc(50vw - 33vw) 10px;
  scrollbar-width:none; min-height:60vw}
.deck::-webkit-scrollbar{display:none}
.dcard{flex:0 0 66vw; max-width:330px; aspect-ratio:3/4; border-radius:22px; overflow:hidden;
  scroll-snap-align:center; background:var(--surf); border:1.5px solid var(--line); position:relative;
  transition:border-color .2s, box-shadow .2s; box-shadow:var(--shadow)}
.dcard img{width:100%; height:100%; object-fit:cover}
.dcard.none{display:grid; place-items:center; color:var(--mut); letter-spacing:.1em; text-transform:uppercase; font-size:.85rem}
.dcard.centered{border-color:var(--acc); box-shadow:0 0 0 2px var(--acc), var(--shadow)}
.dcard .dnm{position:absolute; bottom:0; left:0; right:0; padding:26px 14px 12px; color:#fff; font-size:.95rem;
  background:linear-gradient(transparent, rgba(0,0,0,.65))}
.deckhint{text-align:center; color:var(--mut); font-size:.75rem; letter-spacing:.1em; text-transform:uppercase; padding-bottom:4px}
/* corner look preview */
.peek{position:fixed; right:12px; top:calc(272px + env(safe-area-inset-top)); z-index:30; display:flex; flex-direction:column; gap:6px; max-height:60vh; overflow-y:auto; scrollbar-width:none}
.peek::-webkit-scrollbar{display:none}
.peek button{flex:0 0 auto; width:44px; height:52px; border-radius:12px; overflow:hidden; background:var(--surf);
  border:1.5px dashed var(--line); position:relative}
.peek button img{position:absolute; inset:0; width:100%; height:100%; object-fit:cover}
.peek button:has(img){border-style:solid}
.peek button.cur{border-color:var(--acc)}
.peek .xrm{position:absolute; top:1px; right:1px; z-index:2; width:16px; height:16px; border-radius:50%;
  background:rgba(0,0,0,.55); color:#fff; font-size:.6rem; font-style:normal; display:grid; place-items:center}
.peek .addslot{border-style:dashed; color:var(--mut); font-size:1.2rem; display:grid; place-items:center; height:44px}
.studiobar{display:flex; gap:10px; padding:8px 20px 4px}
.studiobar .btn{padding:12px}
.suggcard{background:var(--surf); border:1px solid var(--line); border-radius:16px; padding:12px; margin-bottom:12px}
.suggcard .hrow{margin-bottom:10px}
@media (prefers-reduced-motion:reduce){ .dcard{transition:none} .sheet{transition:none} }

/* ---------- looks ---------- */
.lookcard .collage{aspect-ratio:1/1; display:grid; grid-template-columns:1fr 1fr; grid-template-rows:1fr 1fr; gap:2px; background:var(--surf2)}
.lookcard .collage img{width:100%; height:100%; object-fit:cover}
.lookcard .collage.n1{grid-template-columns:1fr; grid-template-rows:1fr}
.lookcard .collage.n2{grid-template-rows:1fr}
.lookcard .collage.n3 img:first-child{grid-row:span 2}
.minirate{color:var(--acc2); font-size:.75rem; letter-spacing:2px}
.rateblock{margin:6px 0 14px}
.raterow{display:flex; align-items:center; gap:12px; margin-bottom:4px}
.ratelbl{width:72px; font-size:.72rem; color:var(--mut); letter-spacing:.14em; text-transform:uppercase}
.raterow .stars{margin:0}

/* ---------- insights ---------- */
.ins{padding:0 20px 24px}
.panel{background:var(--surf); border:1px solid var(--line); border-radius:var(--r); padding:16px; margin-bottom:16px}
.panel h3{font-family:'Italiana',serif; font-size:1.25rem; letter-spacing:.06em; margin-bottom:4px}
.panel .note{color:var(--mut); font-size:.8rem; margin-bottom:12px}
.hrow{display:flex; gap:10px; overflow-x:auto; scrollbar-width:none; padding-bottom:4px}
.hrow::-webkit-scrollbar{display:none}
.thumb{flex:0 0 84px}
.thumb img{width:84px; height:104px; object-fit:cover; border-radius:12px; border:1px solid var(--line)}
.thumb .t{font-size:.68rem; color:var(--mut); margin-top:4px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
.bar{height:8px; border-radius:8px; background:var(--surf2); overflow:hidden; margin:5px 0 10px}
.bar i{display:block; height:100%; background:var(--acc)}
.catlbl{display:flex; justify-content:space-between; font-size:.8rem; color:var(--mut)}
.heat{display:grid; grid-template-columns:repeat(14,1fr); gap:4px}
.heat i{aspect-ratio:1; border-radius:4px; background:var(--surf2)}
.heat i.on{background:var(--acc)}
.cpw{display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid var(--line); font-size:.9rem}
.cpw:last-child{border-bottom:none}
.cpw .amt{color:var(--acc2)}
/* ---------- plan calendar ---------- */
.calhead{display:flex; align-items:center; justify-content:space-between; margin-bottom:10px}
.cal{display:grid; grid-template-columns:repeat(7,1fr); gap:4px}
.cal.dow{margin-bottom:4px; text-align:center; color:var(--mut); font-size:.68rem; letter-spacing:.1em}
.cal .day{aspect-ratio:1; border-radius:10px; background:var(--surf2); border:1px solid transparent;
  position:relative; overflow:hidden; font-size:.72rem; padding:0}
.cal .day .n{position:absolute; top:3px; left:5px; z-index:2; line-height:1}
.cal .day.today{border-color:var(--acc)}
.cal .day.has{background:color-mix(in srgb, var(--acc) 18%, var(--surf2))}
.cal .day.has .n{background:color-mix(in srgb, var(--bg) 65%, transparent); border-radius:6px; padding:1px 4px}
.dthumb{position:absolute; inset:0}
.dthumb img{width:100%;height:100%;object-fit:cover; opacity:.85}
.dmore{position:absolute; right:3px; bottom:3px; z-index:2; font-size:.6rem; background:var(--acc);
  color:var(--acc-ink); border-radius:999px; padding:1px 5px; line-height:1.4}

.toast{position:fixed; left:50%; transform:translateX(-50%) translateY(20px); bottom:calc(100px + env(safe-area-inset-bottom));
  background:var(--text); color:var(--bg); padding:10px 20px; border-radius:999px; font-size:.88rem; z-index:80;
  opacity:0; pointer-events:none; transition:all .3s}
.toast.show{opacity:1; transform:translateX(-50%) translateY(0)}
.hidden{display:none!important}
.palrow{display:flex; align-items:center; gap:14px; width:100%; padding:12px; border-radius:14px;
  background:var(--surf); border:1px solid var(--line); margin-bottom:10px; font-size:1rem; text-align:left}
.palrow.on{border-color:var(--acc)}
.palsw{width:52px; height:34px; border-radius:10px; display:grid; place-items:center; border:1px solid var(--line)}
.palsw i{width:16px; height:16px; border-radius:50%; display:block}
</style>
</head>
<body>

<header>
  <h1 class="wordmark">Ch<span>i</span>c</h1>
</header>
<div class="tagline" id="tagline">Your closet, curated.</div>
<div class="topbar">
  <button class="iconbtn" id="profBtn" aria-label="Switch closet">👤</button>
  <button class="iconbtn" id="themeBtn" aria-label="Toggle dark or light">◐</button>
  <button class="iconbtn" id="fsBtn" aria-label="Fullscreen">⛶</button>
</div>

<main id="view"></main>

<button class="fab hidden" id="fab" aria-label="Add item">+</button>

<nav>
  <button data-tab="closet" class="on"><span class="ni">▤</span>Closet</button>
  <button data-tab="studio"><span class="ni">✦</span>Studio</button>
  <button data-tab="looks"><span class="ni">❥</span>Looks</button>
  <button data-tab="plan"><span class="ni">▦</span>Plan</button>
  <button data-tab="insights"><span class="ni">◔</span>Insights</button>
</nav>

<div class="veil" id="veil"></div>
<div class="sheet" id="sheet"></div>
<div class="toast" id="toast"></div>
<input type="file" id="fileIn" accept="image/*" class="hidden">
<input type="file" id="camIn" accept="image/*" capture="environment" class="hidden">
<input type="file" id="wishIn" accept="image/*" class="hidden">
<input type="file" id="importIn" accept="application/json,.json" class="hidden">

<script>

/* ============ indexeddb ============ */
let db;
function idb(){ return new Promise((res,rej)=>{
  const r = indexedDB.open("chic",3);
  r.onupgradeneeded = e=>{
    const d = e.target.result;
    if(!d.objectStoreNames.contains("items")) d.createObjectStore("items",{keyPath:"id"});
    if(!d.objectStoreNames.contains("looks")) d.createObjectStore("looks",{keyPath:"id"});
    if(!d.objectStoreNames.contains("plans")) d.createObjectStore("plans",{keyPath:"id"});
    if(!d.objectStoreNames.contains("trips")) d.createObjectStore("trips",{keyPath:"id"});
    if(!d.objectStoreNames.contains("wishes")) d.createObjectStore("wishes",{keyPath:"id"});
  };
  r.onsuccess = e=>{ db=e.target.result; res(); };
  r.onerror = ()=>rej(r.error);
});}
function put(store,obj){ if(!obj.pid) obj.pid=activePid; obj.up=Date.now(); return new Promise((res,rej)=>{
  const t = db.transaction(store,"readwrite"); t.objectStore(store).put(obj);
  t.oncomplete=res; t.onerror=()=>rej(t.error);
});}
function del(store,id){ return new Promise((res,rej)=>{
  const t = db.transaction(store,"readwrite"); t.objectStore(store).delete(id);
  t.oncomplete=res; t.onerror=()=>rej(t.error);
});}
function all(store){ return new Promise((res,rej)=>{
  const r = db.transaction(store).objectStore(store).getAll();
  r.onsuccess=()=>res(r.result); r.onerror=()=>rej(r.error);
});}

/* ============ backup / restore / reminders ============ */
async function exportAll(){
  try{
    const data={ app:"chic", v:3, exported:Date.now(), profiles, activePid,
      items:await all("items"), looks:await all("looks"), plans:await all("plans"),
      trips:await all("trips"), wishes:await all("wishes") };
    const blob=new Blob([JSON.stringify(data)],{type:"application/json"});
    const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
    a.download="chic-backup-"+today()+".json"; document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(a.href),2000);
    toast("Backup saved ⬇");
  }catch(e){ toast("Export failed"); }
}
function mergeRecord(st, mine, inc){
  // union wear history, keep every favourite/rating high-water mark,
  // and let the more recently edited copy win the descriptive fields
  const newer = (inc.up||inc.created||0) > (mine.up||mine.created||0);
  const out = newer? {...mine, ...inc} : {...inc, ...mine};
  if(mine.wearDates||inc.wearDates)
    out.wearDates=[...new Set([...(mine.wearDates||[]),...(inc.wearDates||[])])].sort();
  out.fav = !!(mine.fav||inc.fav);
  for(const k of ["style","comfort","rating"])
    if(mine[k]!=null||inc[k]!=null) out[k]=Math.max(mine[k]||0,inc[k]||0);
  if(st==="items") out.todo = out.todo || mine.todo || inc.todo || null;
  if(st==="trips"){
    const days={...(inc.days||{})};
    for(const [d,v] of Object.entries(mine.days||{})){
      const a=Array.isArray(v)?v:[v], b=days[d]? (Array.isArray(days[d])?days[d]:[days[d]]):[];
      days[d]=[...new Set([...b,...a])];
    }
    out.days=days;
    out.packed={...(inc.packed||{}),...(mine.packed||{})};
    const ex={}; [...(inc.extras||[]),...(mine.extras||[])].forEach(x=>{ ex[x.id]={...ex[x.id],...x, done:!!(x.done||(ex[x.id]&&ex[x.id].done))}; });
    out.extras=Object.values(ex);
  }
  return out;
}
async function importAll(file){
  let data;
  try{ data=JSON.parse(await file.text()); }catch(e){ toast("Not a valid backup file"); return; }
  if(data.app!=="chic" && !data.items && !data.profiles){ toast("That's not a Chic backup"); return; }
  if(!confirm("Merge this backup into Chic? Nothing on this device will be deleted — new pieces are added and shared ones are combined.")) return;
  try{
    const added={};
    for(const st of ["items","looks","plans","trips","wishes"]){
      const mine=new Map((await all(st)).map(r=>[r.id,r]));
      added[st]=0;
      for(const r of (data[st]||[])){
        if(!mine.has(r.id)){ const up=r.up; await put(st,r); if(up) r.up=up; added[st]++; }
        else{
          const merged=mergeRecord(st, mine.get(r.id), r);
          await put(st,merged);
        }
      }
    }
    if(Array.isArray(data.profiles)){
      for(const p of data.profiles){
        const ex=profiles.find(x=>x.id===p.id);
        if(!ex) profiles.push(p);
        else{ ex.pal=ex.pal||p.pal; }
      }
      saveProfiles();
    }
    closeSheet(); await reloadProfile();
    toast(`Merged ✓ +${added.items} pieces, +${added.looks} looks, +${added.wishes} wishes`);
  }catch(e){ toast("Import failed"); }
}

/* ============ image helpers ============ */
function compress(file){ return new Promise((res,rej)=>{
  const img=new Image(), u=URL.createObjectURL(file);
  img.onload=()=>{
    const M=800, sc=Math.min(1, M/Math.max(img.width,img.height));
    const c=document.createElement("canvas");
    c.width=Math.round(img.width*sc); c.height=Math.round(img.height*sc);
    c.getContext("2d").drawImage(img,0,0,c.width,c.height);
    URL.revokeObjectURL(u);
    res(c.toDataURL("image/jpeg",.82));
  };
  img.onerror=()=>{URL.revokeObjectURL(u); rej(new Error("bad image"));};
  img.src=u;
});}
function dominantColor(dataUrl){ return new Promise(res=>{
  const img=new Image();
  img.onload=()=>{
    const c=document.createElement("canvas"); c.width=c.height=40;
    const x=c.getContext("2d");
    x.drawImage(img, img.width*.2, img.height*.2, img.width*.6, img.height*.6, 0,0,40,40);
    const d=x.getImageData(0,0,40,40).data;
    let r=0,g=0,b=0,n=0;
    for(let i=0;i<d.length;i+=4){ r+=d[i]; g+=d[i+1]; b+=d[i+2]; n++; }
    r/=n; g/=n; b/=n;
    let best=null, bd=1e9;
    for(const [nm,hx] of COLORS){
      const R=parseInt(hx.slice(1,3),16), G=parseInt(hx.slice(3,5),16), B=parseInt(hx.slice(5,7),16);
      const dd=(R-r)**2+(G-g)**2+(B-b)**2;
      if(dd<bd){bd=dd; best=nm;}
    }
    res(best);
  };
  img.onerror=()=>res(null);
  img.src=dataUrl;
});}

/* ============ studio ============ */
let studioMode = "two"; // "two" | "one" | "saree"
let curSlot = "top";
let extraSlots = []; // [{key, cat}]
const REDUCE = matchMedia("(prefers-reduced-motion: reduce)").matches;
function studioSlots(){
  const base = studioMode==="saree"? ["saree","blouse"]
             : studioMode==="one"?   ["dress"]
             :                       ["top","bottom"];
  return [...base,"outerwear","footwear","accessory"].map(c=>({key:c, cat:c})).concat(extraSlots);
}
function slotCat(key){ const d=studioSlots().find(s=>s.key===key); return d? d.cat : key; }
function slotDef(key){ return studioSlots().find(s=>s.key===key); }
function slotItems(def){ return items.filter(i=>i.cat===def.cat && (!def.sub||i.sub===def.sub)); }
/* ============ studio stylist ============ */
const NEUTRALS=new Set(["Black","White","Grey","Beige","Brown","Navy","Olive","Gold"]);
function hexHue(hex){
  const r=parseInt(hex.slice(1,3),16)/255, g=parseInt(hex.slice(3,5),16)/255, b=parseInt(hex.slice(5,7),16)/255;
  const mx=Math.max(r,g,b), mn=Math.min(r,g,b), d=mx-mn;
  if(d===0) return 0;
  let h; if(mx===r) h=((g-b)/d)%6; else if(mx===g) h=(b-r)/d+2; else h=(r-g)/d+4;
  h*=60; if(h<0)h+=360; return h;
}
function harmony(a,b){
  if(!a||!b) return 1.5;
  if(a===b) return 2;
  if(NEUTRALS.has(a)||NEUTRALS.has(b)) return 3;
  let d=Math.abs(hexHue(colorHex(a))-hexHue(colorHex(b))); if(d>180)d=360-d;
  if(d<25) return 2;      // analogous
  if(d>150) return 2.4;   // complementary
  if(d<55||d>125) return 1.6;
  return 1.1;             // mid = a touch clashy
}
function freshness(it){
  if(it.often) return 0.3;
  if(!it.wearDates||!it.wearDates.length) return 1.5;
  const days=(Date.now()-new Date(it.wearDates[it.wearDates.length-1]))/864e5;
  return Math.min(days/30,1)*1.5;
}
function occasionOk(it,occ){
  if(!occ||occ==="Any") return true;
  if(!it.occs||!it.occs.length) return true; // versatile pieces fit anywhere
  return it.occs.includes(occ);
}
function scorePiece(it,ctx,occ){
  let s=1 + freshness(it) + (it.style||0)*0.2 + (it.comfort||0)*0.08;
  if(it.fav) s+=0.6;
  if(ctx.length){ let h=0; ctx.forEach(c=>h+=harmony(it.color,c)); s+=h/ctx.length; }
  if(it.todo && it.todo.type==="alteration") s-=0.8;
  return s + Math.random()*0.8;
}
function eligible(cat,occ,sub){
  return items.filter(i=>i.cat===cat && (!sub||i.sub===sub) && occasionOk(i,occ));
}
function pickWeighted(cands,scoreFn){
  if(!cands.length) return null;
  const scored=cands.map(it=>({it,s:Math.max(0.01,scoreFn(it))}));
  const tot=scored.reduce((a,b)=>a+b.s,0);
  let r=Math.random()*tot;
  for(const x of scored){ r-=x.s; if(r<=0) return x.it; }
  return scored[scored.length-1].it;
}
function buildSuggestion(occ){
  const out={}, ctx=[];
  const add=(cat,sub)=>{
    const pick=pickWeighted(eligible(cat,occ,sub), it=>scorePiece(it,ctx,occ));
    if(pick){ out[cat]=pick.id; if(pick.color) ctx.push(pick.color); }
    return pick;
  };
  if(studioMode==="saree"){ if(!add("saree")) return null; add("blouse"); }
  else if(studioMode==="one"){ if(!add("dress")) return null; }
  else { const t=add("top"), b=add("bottom"); if(!t||!b) return null; }
  add("footwear");
  if(studioMode==="saree"){
    const jew=["Earrings","Necklace","Bangles"];
    let c=eligible("accessory",occ).filter(i=>!i.sub||jew.includes(i.sub));
    if(!c.length) c=eligible("accessory",occ);
    const pick=pickWeighted(c, it=>scorePiece(it,ctx,occ));
    if(pick) out.accessory=pick.id;
  } else add("accessory");
  if(["Work","Festive","Party"].includes(occ) || Math.random()<0.3) add("outerwear");
  return out;
}
function generateSuggestions(occ,n=3){
  const seen=new Set(), res=[]; let tries=0;
  while(res.length<n && tries<n*6){
    tries++;
    const s=buildSuggestion(occ); if(!s) break;
    const key=[s.top,s.bottom,s.dress,s.saree,s.blouse].filter(Boolean).join("|");
    if(seen.has(key)) continue;
    seen.add(key); res.push(s);
  }
  return res;
}

function centerCard(deck){
  const mid=deck.scrollLeft+deck.clientWidth/2;
  let best=null, bd=1e9;
  [...deck.children].forEach(c=>{
    const d=Math.abs(c.offsetLeft+c.offsetWidth/2-mid);
    if(d<bd){bd=d; best=c;}
  });
  return best;
}
function deckTilt(deck){
  const mid=deck.scrollLeft+deck.clientWidth/2;
  [...deck.children].forEach(c=>{
    const d=(c.offsetLeft+c.offsetWidth/2-mid)/deck.clientWidth;
    if(!REDUCE){
      const sc=1-Math.min(.16,Math.abs(d)*.4);
      c.style.transform=`scale(${sc})`;
      c.style.opacity=String(1-Math.min(.45,Math.abs(d)*.9));
    }
    c.classList.remove("centered");
  });
  const cc=centerCard(deck); if(cc) cc.classList.add("centered");
}
function commitCenter(deck){
  const cc=centerCard(deck); if(!cc) return;
  sel[curSlot]=cc.dataset.id||null;
  const chip=document.querySelector(`.slotchips [data-slot="${curSlot}"]`);
  if(chip) chip.classList.toggle("done", !!sel[curSlot]);
  renderPeek();
}

function suggestLookName(ids, occs){

  const s=[...its].sort((a,b)=>(rank[a.cat]??9)-(rank[b.cat]??9));

  let n=main.name + (second? " + "+second.name : "");

  return n.length>46? n.slice(0,44)+"…" : n;

async function shareLook(lk){
  const its=lk.itemIds.map(item).filter(Boolean);
  if(!its.length){ toast("Nothing to share"); return; }
  toast("Rendering…");
  const loaded=await Promise.all(its.map(i=>new Promise(res=>{
    const im=new Image(); im.onload=()=>res(im); im.onerror=()=>res(null); im.src=i.img; })));
  const imgs=loaded.filter(Boolean);
  if(!imgs.length){ toast("Couldn't load photos"); return; }
  const W=1080, pad=48, gap=24, cols=imgs.length===1?1:2;
  const cellW=(W-pad*2-gap*(cols-1))/cols, cellH=cellW*1.25;
  const rows=Math.ceil(imgs.length/cols), headerH=180, footerH=96;
  const H=Math.round(headerH+rows*cellH+(rows-1)*gap+footerH);
  const c=document.createElement("canvas"); c.width=W; c.height=H;
  const x=c.getContext("2d");
  x.fillStyle="#F3EBDD"; x.fillRect(0,0,W,H);
  x.textAlign="center"; x.fillStyle="#2C1E12";
  x.font="600 38px Georgia, 'Times New Roman', serif";
  x.fillText("C H I C", W/2, 72);
  x.fillStyle="#3a2a1a"; x.font="italic 500 46px Georgia, serif";
  let nm=lk.name||"Look"; if(nm.length>26) nm=nm.slice(0,25)+"…";
  x.fillText(nm, W/2, 132);
  const rr=(px,py,pw,ph,r)=>{ x.beginPath(); x.moveTo(px+r,py);
    x.arcTo(px+pw,py,px+pw,py+ph,r); x.arcTo(px+pw,py+ph,px,py+ph,r);
    x.arcTo(px,py+ph,px,py,r); x.arcTo(px,py,px+pw,py,r); x.closePath(); };
  imgs.forEach((im,idx)=>{
    const col=idx%cols, row=Math.floor(idx/cols);
    const px=pad+col*(cellW+gap), py=headerH+row*(cellH+gap);
    x.save(); x.fillStyle="#fff"; rr(px,py,cellW,cellH,20); x.fill(); x.clip();
    const s=Math.max(cellW/im.width, cellH/im.height), dw=im.width*s, dh=im.height*s;
    x.drawImage(im, px+(cellW-dw)/2, py+(cellH-dh)/2, dw, dh); x.restore();
  });
  x.fillStyle="#6E5A44"; x.font="500 30px Georgia, serif"; x.textAlign="center";
  const ov=overall(lk);
  x.fillText(its.length+" pieces"+(ov?"   ·   "+"★".repeat(ov):""), W/2, H-40);
  c.toBlob(async blob=>{
    if(!blob){ toast("Couldn't render"); return; }
    const fname=(lk.name||"look").replace(/[^\w]+/g,"-").replace(/^-|-$/g,"")+".png";
    const file=new File([blob], fname, {type:"image/png"});
    if(navigator.canShare && navigator.canShare({files:[file]})){
      try{ await navigator.share({files:[file], title:lk.name||"My look"}); return; }
      catch(e){ if(e && e.name==="AbortError") return; }
    }
    const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download=fname;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(a.href),2000); toast("Saved image ⬇");
  }, "image/png");
}

function lookThumb(lk){ const i=lk && item(lk.itemIds[0]); return i? `<img src="${i.img}" alt="">` : ""; }

function planView(){
  const y=planMonth.getFullYear(), m=planMonth.getMonth();
  const first=new Date(y,m,1).getDay(), days=new Date(y,m+1,0).getDate();
  let cells="";
  for(let i=0;i<first;i++) cells+="<i></i>";
  for(let d=1;d<=days;d++){
    const ds=dstr(new Date(y,m,d));
    const p=plans.filter(p=>p.date===ds);
    const isToday=ds===today();
    cells+=`<button class="day ${isToday?"today":""} ${p.length?"has":""}" data-date="${ds}">
      <span class="n">${d}</span>
      ${p.length? `<span class="dthumb">${lookThumb(look(p[0].lookId))}</span>`:""}
      ${p.length>1? `<span class="dmore">+${p.length-1}</span>`:""}</button>`;
  }
  $("#view").innerHTML = `<div class="ins">
    <div class="panel">
      <div class="calhead">
        <button class="iconbtn" id="pm">‹</button>
        <h3>${MONTHS[m]} ${y}</h3>
        <button class="iconbtn" id="nm">›</button>
      </div>
      <div class="cal dow"><i>S</i><i>M</i><i>T</i><i>W</i><i>T</i><i>F</i><i>S</i></div>
      <div class="cal" id="calgrid">${cells}</div>
    </div>
    <div class="panel"><h3>Trips</h3><div class="note">Pick looks per day, get a packing checklist.</div>
      ${trips.map(t=>{
        const pk=packItems(t), ex=t.extras||[];
        const total=pk.length+ex.length;
        const done=pk.filter(i=>(t.packed||{})[i.id]).length + ex.filter(x=>x.done).length;
        return `<div class="cpw trip" data-id="${t.id}"><span>${esc(t.name)} <span style="color:var(--mut)">· ${t.start} → ${t.end}</span></span><span class="amt">${total?`${done}/${total} packed`:"plan ›"}</span></div>`;
      }).join("")}
      <button class="btn ghost" id="newTrip" style="margin-top:10px">+ New trip</button>
    </div>
  </div>`;
  $("#pm").onclick=()=>{ planMonth.setMonth(m-1); render(); };
  $("#nm").onclick=()=>{ planMonth.setMonth(m+1); render(); };
  $("#calgrid").onclick=e=>{ const d=e.target.closest(".day"); if(d) daySheet(d.dataset.date); };
  $("#newTrip").onclick=()=>tripEditSheet(null);
  $("#view").querySelectorAll(".trip").forEach(r=>r.onclick=()=>tripSheet(r.dataset.id));
}

function pickLookSheet(title, cb){
  if(!looks.length){ toast("Save a look in the Studio first"); return; }
  openSheet(`<h2>${title}</h2><div class="grid" style="padding:0">${
    [...looks].sort((a,b)=>b.created-a.created).map(lk=>{
      const imgs=lk.itemIds.map(item).filter(Boolean).slice(0,4);
      return `<div class="card lookcard" data-id="${lk.id}">
        <div class="collage n${imgs.length}">${imgs.map(i=>`<img src="${i.img}" alt="">`).join("")}</div>
        <div class="meta"><div class="nm">${esc(lk.name)}</div></div></div>`;
    }).join("")}</div>`);
  $("#sheet").onclick = e=>{ const c=e.target.closest(".card"); if(c){ $("#sheet").onclick=null; cb(c.dataset.id); } };
}

function daySheet(ds){
  const dayPlans = plans.filter(p=>p.date===ds);
  openSheet(`
    <h2>${ds}</h2>
    ${dayPlans.map(p=>{ const lk=look(p.lookId);
      return `<div class="cpw"><span>${lk?esc(lk.name):"look removed"}${p.note?` <span style="color:var(--mut)">— ${esc(p.note)}</span>`:""}</span>
        <button style="color:var(--danger)" data-rm="${p.id}">✕</button></div>`;}).join("")}
    <div class="frow" style="margin-top:12px"><label>Note (occasion)</label><input id="p_note" placeholder="e.g. Tara's school day"></div>
    <button class="btn" id="p_add">＋ Pin a look to this day</button>
  `);
  $("#sheet").querySelectorAll("[data-rm]").forEach(b=>b.onclick=async ()=>{
    plans=plans.filter(p=>p.id!==b.dataset.rm); await del("plans",b.dataset.rm); daySheet(ds); render();
  });
  $("#p_add").onclick=()=>{
    const note=$("#p_note").value.trim();
    pickLookSheet("Pin to "+ds, async lookId=>{
      const rep = plans.find(x=>x.lookId===lookId && x.date!==ds && Math.abs(new Date(x.date)-new Date(ds))<30*864e5);
      const p={id:uid(), date:ds, lookId, note};
      plans.push(p); await put("plans",p);
      daySheet(ds); render();
      toast(rep? "Pinned — heads up, you wore this look on "+rep.date : "Pinned ✓");
    });
  };
}

/* ---- trips ---- */
function tripDays(t){
  const out=[]; let d=new Date(t.start);
  const end=new Date(t.end);
  while(d<=end && out.length<31){ out.push(dstr(d)); d=new Date(d.getTime()+864e5); }
  return out;
}
function dayLookIds(t,d){
  const v=(t.days||{})[d];
  return !v? [] : Array.isArray(v)? v : [v];
}
function packItems(t){
  const ids=new Set(tripDays(t).flatMap(d=>dayLookIds(t,d)).flatMap(lid=>{const lk=look(lid); return lk?lk.itemIds:[];}));
  return [...ids].map(item).filter(Boolean);
}
function tripEditSheet(existing){
  openSheet(`
    <h2>${existing?"Edit trip":"New trip"}</h2>
    <div class="frow"><label>Name</label><input id="t_name" value="${existing?esc(existing.name):""}" placeholder="e.g. Coimbatore weekend"></div>
    <div class="row2">
      <div class="frow"><label>From</label><input type="date" id="t_start" value="${existing?existing.start:today()}"></div>
      <div class="frow"><label>To</label><input type="date" id="t_end" value="${existing?existing.end:today()}"></div>
    </div>
    <button class="btn" id="t_save">${existing?"Save":"Create trip"}</button>
    ${existing?'<button class="btn danger" id="t_del" style="margin-top:10px">Delete trip</button>':""}
  `);
  $("#t_save").onclick=async ()=>{
    const name=$("#t_name").value.trim()||"Trip", start=$("#t_start").value, end=$("#t_end").value;
    if(!start||!end||end<start){ toast("Check the dates"); return; }
    let t=existing;
    if(t) Object.assign(t,{name,start,end});
    else { t={id:uid(), name, start, end, days:{}, packed:{}, extras:[]}; trips.push(t); }
    await put("trips",t); closeSheet(); tripSheet(t.id); render();
  };
  if(existing) $("#t_del").onclick=async ()=>{
    if(!confirm("Delete this trip?"))return;
    trips=trips.filter(x=>x.id!==existing.id); await del("trips",existing.id);
    closeSheet(); render(); toast("Deleted");
  };
}
function tripSheet(id){
  const t=trips.find(x=>x.id===id); if(!t)return;
  const days=tripDays(t);
  const packing=packItems(t);
  const byCat={};
  packing.forEach(i=>{ (byCat[i.cat]=byCat[i.cat]||[]).push(i); });
  const done=[...packing.map(i=>t.packed[i.id]), ...(t.extras||[]).map(x=>x.done)].filter(Boolean).length;
  const total=packing.length+(t.extras||[]).length;
  openSheet(`
    <h2>${esc(t.name)}</h2>
    <div class="dsub">${t.start} → ${t.end} · <button style="color:var(--acc)" id="t_edit">edit</button></div>
    <div class="frow"><label>Looks per day</label>
      ${days.map(d=>{
        const lks=dayLookIds(t,d).map(look).filter(Boolean);
        return `<div class="cpw" style="flex-wrap:wrap"><span style="width:100%">${d}</span>
          ${lks.map(lk=>`<span class="chip mini" style="margin:4px 6px 0 0">${esc(lk.name)} <b data-dlrm="${d}|${lk.id}" style="color:var(--danger);font-weight:400">✕</b></span>`).join("")}
          <button class="chip mini dayadd" data-d="${d}" style="margin-top:4px;color:var(--acc)">＋ add look</button>
        </div>`;}).join("")}
    </div>
    ${total?`<div class="frow"><label>Packing — ${done}/${total}</label>
      <div class="bar"><i style="width:${total?done/total*100:0}%"></i></div>
      ${Object.entries(byCat).map(([c,arr])=>`
        <div class="dsub" style="margin:8px 0 2px">${catLbl(c)}</div>
        ${arr.map(i=>`<div class="cpw pk" data-id="${i.id}"><span>${t.packed[i.id]?"☑":"☐"} ${esc(i.name)}</span></div>`).join("")}`).join("")}
      ${(t.extras||[]).map(x=>`<div class="cpw px" data-id="${x.id}"><span>${x.done?"☑":"☐"} ${esc(x.text)}</span><button style="color:var(--danger)" data-xrm="${x.id}">✕</button></div>`).join("")}
    </div>`:""}
    <div class="row2"><input id="t_extra" placeholder="Add essential (charger, meds…)"><button class="btn ghost" id="t_addx" style="flex:0 0 80px">Add</button></div>
  `);
  $("#t_edit").onclick=()=>tripEditSheet(t);
  $("#sheet").querySelectorAll(".dayadd").forEach(r=>r.onclick=()=>{
    pickLookSheet("Look for "+r.dataset.d, async lookId=>{
      const arr=dayLookIds(t,r.dataset.d);
      if(!arr.includes(lookId)) arr.push(lookId);
      t.days[r.dataset.d]=arr; await put("trips",t); tripSheet(id); render();
    });
  });
  $("#sheet").querySelectorAll("[data-dlrm]").forEach(b=>b.onclick=async e=>{
    e.stopPropagation();
    const [d,lid]=b.dataset.dlrm.split("|");
    t.days[d]=dayLookIds(t,d).filter(x=>x!==lid);
    await put("trips",t); tripSheet(id); render();
  });
  $("#sheet").querySelectorAll(".pk").forEach(r=>r.onclick=async ()=>{
    t.packed[r.dataset.id]=!t.packed[r.dataset.id]; await put("trips",t); tripSheet(id);
  });
  $("#sheet").querySelectorAll(".px").forEach(r=>r.onclick=async e=>{
    const rm=e.target.closest("[data-xrm]");
    if(rm){ t.extras=t.extras.filter(x=>x.id!==rm.dataset.xrm); }
    else { const x=t.extras.find(x=>x.id===r.dataset.id); x.done=!x.done; }
    await put("trips",t); tripSheet(id);
  });
  $("#t_addx").onclick=async ()=>{
    const v=$("#t_extra").value.trim(); if(!v)return;
    (t.extras=t.extras||[]).push({id:uid(), text:v, done:false});
    await put("trips",t); tripSheet(id);
  };
}

/* ============ insights ============ */
function insightsView(){
  const usedIds = new Set(looks.flatMap(l=>l.itemIds));
  const never = items.filter(i=>!usedIds.has(i.id));
  const neglected = items.filter(i=>!i.often && (i.wearDates.length===0 ||
    (Date.now()-new Date(i.wearDates[i.wearDates.length-1])>90*864e5))).sort((a,b)=>a.wearDates.length-b.wearDates.length);
  const counts = CATS.map(c=>({c, n:items.filter(i=>i.cat===c.id).length}));
  const maxN = Math.max(1,...counts.map(x=>x.n));
  const cpw = items.filter(i=>i.price).map(i=>({i, v:i.wearDates.length? i.price/i.wearDates.length : i.price}))
    .sort((a,b)=>b.v-a.v).slice(0,6);
  // heatmap: last 70 days of look logs
  const logDays = new Set(looks.flatMap(l=>l.wearDates).concat(items.flatMap(i=>i.wearDates)));
  let heat="";
  for(let d=69; d>=0; d--){
    const day=new Date(Date.now()-d*864e5).toISOString().slice(0,10);
    heat += `<i class="${logDays.has(day)?"on":""}" title="${day}"></i>`;
  }
  const thumbs = arr => arr.length? `<div class="hrow">${arr.slice(0,10).map(i=>
    `<div class="thumb" data-id="${i.id}"><img src="${i.img}" alt=""><div class="t">${esc(i.name)}</div></div>`).join("")}</div>`
    : `<div class="note" style="margin:0">Nothing here — nice.</div>`;
  $("#view").innerHTML = `<div class="ins">
    <div class="panel"><h3>Storage</h3><div class="note" id="stNote">Measuring…</div><div class="bar"><i id="stBar" style="width:0%"></i></div></div>
    <div class="panel"><h3>Outfit diary</h3><div class="note">Days you logged a wear, last 10 weeks.</div><div class="heat">${heat}</div></div>
    ${items.some(i=>i.todo)?`<div class="panel"><h3>To fix &amp; fetch</h3><div class="note">Alterations pending and pieces to buy — tap when sorted.</div>
      ${items.filter(i=>i.todo).map(i=>`<div class="cpw" data-todo="${i.id}"><span>${i.todo.type==="alteration"?"✂":"🛍"} ${esc(i.name)}${i.todo.note?` <span style="color:var(--mut)">— ${esc(i.todo.note)}</span>`:""}</span><span class="amt">›</span></div>`).join("")}
    </div>`:""}
    <div class="panel"><h3>Wishlist ✨</h3><div class="note">Pieces you're dreaming of — tap one when it comes home.</div>
      ${wishes.length? [...wishes].sort((a,b)=>b.created-a.created).map(w=>`<div class="cpw" data-wish="${w.id}"><span>${esc(w.name)} <span style="color:var(--mut)">· ${catLbl(w.cat)}${w.note?" — "+esc(w.note):""}</span></span><span class="amt">${w.price?"₹"+w.price:"›"}</span></div>`).join("") : ""}
      <button class="btn ghost" id="addWish" style="margin-top:10px">＋ Add a wish</button>
    </div>
    <div class="panel"><h3>Never styled</h3><div class="note">Pieces that appear in no saved look — style them in the Studio or consider letting go.</div>${thumbs(never)}</div>
    <div class="panel"><h3>Neglected</h3><div class="note">Unworn, or untouched for 90+ days.</div>${thumbs(neglected)}</div>
    <div class="panel"><h3>Closet balance</h3><div class="note">Where your closet is heavy or thin.</div>
      ${counts.map(({c,n})=>`<div class="catlbl"><span>${c.lbl}</span><span>${n}</span></div><div class="bar"><i style="width:${n/maxN*100}%"></i></div>`).join("")}
    </div>
    <div class="panel"><h3>Cost per wear</h3><div class="note">Highest first — wear these more or shop less alike.</div>
      ${cpw.length? cpw.map(({i,v})=>`<div class="cpw"><span>${esc(i.name)} <span style="color:var(--mut)">· ${i.wearDates.length} wears</span></span><span class="amt">₹${v.toFixed(0)}</span></div>`).join("") : `<div class="note" style="margin:0">Add prices to pieces to see this.</div>`}
    </div>
  </div>`;
  $("#addWish").onclick=()=>wishSheet(null);
  $("#view").onclick = e=>{
    if(e.target.closest("#addWish")) return;
    const w=e.target.closest("[data-wish]"); if(w){ wishSheet(wishes.find(x=>x.id===w.dataset.wish)); return; }
    if(false) return;
    const td=e.target.closest("[data-todo]"); if(td){ detailSheet(td.dataset.todo); return; }
    const t=e.target.closest(".thumb"); if(t&&t.dataset.id) detailSheet(t.dataset.id); };
  fillStorageMeter();
}

async function fillStorageMeter(){
  const el=$("#stNote"); if(!el) return;
  const photoBytes = items.reduce((s,i)=>s+(i.img? i.img.length*0.75 : 0), 0)
    + wishes.reduce((s,w)=>s+(w.img? w.img.length*0.75 : 0), 0);
  const mb=x=>(x/1048576).toFixed(1);
  let line=`${mb(photoBytes)} MB of photos across ${items.length} pieces in this closet.`;
  try{
    if(navigator.storage && navigator.storage.estimate){
      const est=await navigator.storage.estimate();
      if(est.quota){
        line+=` Device allows ~${Math.round(est.quota/1048576)} MB; ${mb(est.usage||0)} MB used in total.`;
        const b=$("#stBar"); if(b) b.style.width=Math.min(100,(est.usage||0)/est.quota*100).toFixed(1)+"%";
      }
    }
  }catch(e){}
  const el2=$("#stNote"); if(el2) el2.textContent=line+" Back up now and then from the closets menu 💾";
}
/* ============ nav & boot ============ */
function switchTab(t){
  tab=t;
  document.querySelectorAll("nav button").forEach(b=>b.classList.toggle("on", b.dataset.tab===t));
  $("#tagline").textContent = TAGLINES[t];
  $("#fab").classList.toggle("hidden", t!=="closet");
  render();
}
document.querySelector("nav").onclick = e=>{
  const b=e.target.closest("button"); if(b) switchTab(b.dataset.tab);
};
$("#fab").onclick = ()=>itemSheet(null);
function render(){
  if(tab==="closet") closetView();
  else if(tab==="studio") studioView();
  else if(tab==="looks") looksView();
  else if(tab==="plan") planView();
  else insightsView();
}
$("#profBtn").onclick=profileSheet;

// Paint the UI immediately (correct palette, tab chrome, FAB) so it's never blank,
// then load this closet's data in the background and re-render.
applyPal(activeProfile().pal);
updateProfBtn();
switchTab("closet");

(async function boot(){
  try{
    await idb();
    if(!localStorage.getItem("chicMigrated")){
      for(const st of ["items","looks","plans","trips","wishes"]){
        const rows=await all(st);
        for(const r of rows) if(!r.pid){ r.pid=profiles[0].id; await put(st,r); }
      }
      localStorage.setItem("chicMigrated","1");
    }
    if(!localStorage.getItem("chicRateMig")){
      for(const st of ["items","looks"]){
        const rows=await all(st);
        for(const r of rows){
          let ch=false;
          if(r.style===undefined){ r.style=r.rating||0; ch=true; }
          if(r.comfort===undefined){ r.comfort=0; ch=true; }
          if("rating" in r){ delete r.rating; ch=true; }
          if(ch) await put(st,r);
        }
      }
      localStorage.setItem("chicRateMig","1");
    }
    saveProfiles();
    await reloadProfile();
  }catch(e){ toast("Storage unavailable — data won't persist"); }
})();
$("#importIn").onchange=e=>{ const f=e.target.files[0]; e.target.value=""; if(f) importAll(f); };
</script>
